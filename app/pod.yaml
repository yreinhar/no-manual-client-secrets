apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-serviceaccount
  labels:
    app: service-a
---
apiVersion: v1
kind: Pod
metadata:
  name: my-pod
  labels:
    app: service-a
spec:
  serviceAccountName: my-serviceaccount
  containers:
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80
    volumeMounts:
    - mountPath: /var/run/secrets/tokens
      name: vault-token
  volumes:
  - name: vault-token
    projected:
      sources:
      - serviceAccountToken:
          path: kctoken
          expirationSeconds: 600
          audience: http://keycloak.example.com/realms/kubernetes
          
